name: thix_id
description: "THIX ID - Une identité numérique sécurisée"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  go_router: ^14.2.1
  fl_chart: ^0.68.0
  supabase_flutter: ^2.8.3
  http: ^1.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  video_player: ^2.9.2
  geolocator: ^13.0.4
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.0
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/dreamflow_icon.jpg"
  remove_alpha_ios: true
