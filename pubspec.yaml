name: thix_id
description: "THIX ID - Une identité numérique sécurisée"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # State Management & Navigation
  provider: ^6.1.2
  go_router: ^16.3.0
  
  # Charts
  fl_chart: ^0.68.0
  
  # Supabase
  supabase_flutter: ^2.14.1
  realtime_client: ^2.7.3
  
  # Network
  http: ^1.2.2
  
  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  
  # Media
  video_player: ^2.9.2
  image_picker: ^1.1.2  # AJOUTÉ - Pour prendre des photos/vidéos
  cached_network_image: ^3.3.1  # AJOUTÉ - Pour le cache des images
  
  # Communication
  agora_rtc_engine: ^6.3.0
  record: ^5.1.2
  
  # Location & NFC
  geolocator: ^13.0.4
  nfc_manager: ^4.0.0
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.0
  
  # Notifications
  flutter_local_notifications: ^20.0.0
  permission_handler: ^12.0.0
  
  # Sharing & Files
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  
  # PDF
  printing: ^5.13.0
  pdf: ^3.11.0
  
  # Security
  crypto: ^3.0.0
  
  # Utils
  url_launcher: ^6.3.0
  intl: ^0.19.0  # AJOUTÉ - Pour le formatage des dates

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/dreamflow_icon.jpg"
  remove_alpha_ios: true
