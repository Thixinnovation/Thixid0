name: thix_id
description: "THIX ID - Une identité numérique sécurisée"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # State Management & Routing
  provider: ^6.1.2
  go_router: ^16.3.0
  
  # Charts & Data
  fl_chart: ^0.68.0
  
  # Supabase & Backend
  supabase_flutter: ^2.14.1
  realtime_client: ^2.7.3
  http: ^1.2.2
  
  # Storage & Preferences
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  
  # Media
  video_player: ^2.9.2
  record: ^5.1.2
  file_picker: ^8.1.2
  
  # Agora Video Call
  agora_rtc_engine: ^6.3.0
  
  # Location & NFC
  geolocator: ^13.0.4
  nfc_manager: ^4.0.0
  
  # QR Code
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.0
  
  # Notifications
  flutter_local_notifications: ^20.0.0
  permission_handler: ^12.0.0
  
  # Sharing & Printing
  share_plus: ^10.0.0
  printing: ^5.13.0
  pdf: ^3.11.0
  
  # Security & Utils
  crypto: ^3.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/dreamflow_icon.jpg"
  remove_alpha_ios: true
